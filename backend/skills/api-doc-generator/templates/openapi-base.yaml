openapi: 3.0.3
info:
  title: "{API Name}"
  description: "{API 描述}"
  version: "1.0.0"
  contact: { name: "API Support", email: "api@example.com" }

servers:
  - url: "http://localhost:8000"
    description: "Development"
  - url: "https://api.example.com"
    description: "Production"

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        detail: { type: string }
        status_code: { type: integer }

    PaginatedResponse:
      type: object
      properties:
        items: { type: array }
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }

paths:
  /api/v1/{resource}:
    get:
      summary: "List {resource}"
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: page_size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: "Success"
        "401":
          description: "Unauthorized"
