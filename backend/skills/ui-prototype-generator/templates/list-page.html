<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>列表页原型</title>
<style>
  :root {
    --bg-base: #0d1117; --bg-card: #161b22; --bg-elevated: #1c2333;
    --border-subtle: rgba(255,255,255,0.06); --border-medium: rgba(255,255,255,0.12);
    --text-primary: #e6edf3; --text-secondary: #8b949e; --text-muted: #6e7681; --text-dim: #484f58;
    --blue-400: #58a6ff; --blue-bg: rgba(56,139,253,0.1); --blue-border: rgba(56,139,253,0.3);
    --green-400: #3fb950; --green-bg: rgba(63,185,80,0.1); --green-border: rgba(63,185,80,0.3);
    --red-400: #f85149; --red-bg: rgba(248,81,73,0.1); --red-border: rgba(248,81,73,0.3);
    --gold-400: #d29922; --gold-bg: rgba(210,153,34,0.1);
    --radius: 10px; --font-mono: 'SF Mono', 'Fira Code', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'PingFang SC', sans-serif; background: var(--bg-base); color: var(--text-primary); padding: 28px 32px; }
  h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .toolbar { display: flex; gap: 10px; margin: 20px 0; align-items: center; }
  .search { flex: 1; max-width: 360px; padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border-medium); background: var(--bg-card); color: var(--text-primary); font-size: 13px; outline: none; }
  .search:focus { border-color: var(--blue-400); box-shadow: 0 0 0 3px var(--blue-bg); }
  select.filter { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-medium); background: var(--bg-card); color: var(--text-secondary); font-size: 13px; cursor: pointer; }
  .btn { padding: 8px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--blue-400); color: #fff; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border-medium); }
  table { width: 100%; border-collapse: collapse; background: var(--bg-card); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border-subtle); }
  th { text-align: left; padding: 12px 16px; font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; background: var(--bg-elevated); border-bottom: 1px solid var(--border-subtle); }
  td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border-subtle); }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .badge-active { background: var(--green-bg); color: var(--green-400); border: 1px solid var(--green-border); }
  .badge-inactive { background: var(--red-bg); color: var(--red-400); border: 1px solid var(--red-border); }
  .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; font-size: 13px; color: var(--text-muted); }
  .page-btns { display: flex; gap: 4px; }
  .page-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border-medium); background: var(--bg-card); color: var(--text-secondary); cursor: pointer; font-size: 12px; }
  .page-btn.active { background: var(--blue-bg); color: var(--blue-400); border-color: var(--blue-border); }
  @media (max-width: 768px) { body { padding: 16px; } .toolbar { flex-wrap: wrap; } .search { max-width: 100%; } table { font-size: 12px; } th, td { padding: 8px 10px; } }
</style>
</head>
<body>
  <h1>数据管理</h1>
  <p class="subtitle">管理系统中的数据记录</p>

  <div class="toolbar">
    <input class="search" placeholder="搜索名称..." />
    <select class="filter"><option>全部状态</option><option>活跃</option><option>停用</option></select>
    <div style="flex:1"></div>
    <button class="btn btn-primary">+ 新增</button>
  </div>

  <table>
    <thead><tr><th>名称</th><th>状态</th><th>创建时间</th><th>操作</th></tr></thead>
    <tbody>
      <tr><td style="font-weight:500">示例数据 A</td><td><span class="badge badge-active">活跃</span></td><td style="font-family:var(--font-mono);color:var(--text-muted)">2026-01-15</td><td><button class="btn btn-secondary" style="padding:4px 12px;font-size:12px">编辑</button></td></tr>
      <tr><td style="font-weight:500">示例数据 B</td><td><span class="badge badge-active">活跃</span></td><td style="font-family:var(--font-mono);color:var(--text-muted)">2026-02-20</td><td><button class="btn btn-secondary" style="padding:4px 12px;font-size:12px">编辑</button></td></tr>
      <tr><td style="font-weight:500">示例数据 C</td><td><span class="badge badge-inactive">停用</span></td><td style="font-family:var(--font-mono);color:var(--text-muted)">2026-03-10</td><td><button class="btn btn-secondary" style="padding:4px 12px;font-size:12px">编辑</button></td></tr>
    </tbody>
  </table>

  <div class="pagination">
    <span>共 42 条，显示 1-20</span>
    <div class="page-btns">
      <button class="page-btn">上一页</button>
      <button class="page-btn active">1</button>
      <button class="page-btn">2</button>
      <button class="page-btn">3</button>
      <button class="page-btn">下一页</button>
    </div>
  </div>
</body>
</html>
