version: '3.8'

services:
  app:
    build: .
    ports: ['8000:8000']
    environment:
      DATABASE_URL: postgresql+asyncpg://dev:dev@postgres:5432/app_dev
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    volumes: ['./:/app']

  postgres:
    image: postgres:16
    environment: { POSTGRES_DB: app_dev, POSTGRES_USER: dev, POSTGRES_PASSWORD: dev }
    ports: ['5432:5432']
    volumes: ['pgdata:/var/lib/postgresql/data']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dev']
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ['6379:6379']

volumes:
  pgdata:
