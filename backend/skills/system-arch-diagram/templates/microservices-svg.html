<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>微服务架构图</title>
<style>
  body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #0d1117; margin: 0; padding: 40px; }
  svg text { font-family: -apple-system, 'PingFang SC', sans-serif; }
  .box { stroke-width: 1.5; rx: 10; ry: 10; transition: filter 0.2s; cursor: pointer; }
  .box:hover { filter: brightness(1.2); stroke-width: 2.5; }
  .label { font-size: 14px; fill: #fff; text-anchor: middle; dominant-baseline: middle; font-weight: 600; }
  .sub-label { font-size: 11px; fill: rgba(255,255,255,0.7); text-anchor: middle; dominant-baseline: middle; }
  .layer-title { font-weight: bold; font-size: 15px; dominant-baseline: middle; fill: rgba(255,255,255,0.5); }
  .arrow { fill: none; stroke: rgba(255,255,255,0.3); stroke-width: 1.5; marker-end: url(#arrowhead); }
  .arrow-label { font-size: 10px; fill: rgba(255,255,255,0.5); text-anchor: middle; }
</style>
</head>
<body>
<svg width="1200" height="900">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="rgba(255,255,255,0.3)"/></marker>
  </defs>

  <text x="600" y="35" text-anchor="middle" font-size="24" font-weight="bold" fill="#fff">微服务架构图</text>

  <!-- 客户端层 -->
  <rect x="40" y="60" width="1120" height="100" fill="rgba(59,130,246,0.08)" rx="12" stroke="rgba(59,130,246,0.2)"/>
  <text class="layer-title" x="60" y="82" fill="#3B82F6">客户端层</text>
  <g>
    <rect class="box" x="180" y="80" width="160" height="55" fill="#3B82F6"/>
    <text class="label" x="260" y="103">Web SPA</text>
    <text class="sub-label" x="260" y="122">React / TypeScript</text>
  </g>
  <g>
    <rect class="box" x="520" y="80" width="160" height="55" fill="#3B82F6"/>
    <text class="label" x="600" y="103">Mobile App</text>
    <text class="sub-label" x="600" y="122">React Native</text>
  </g>
  <g>
    <rect class="box" x="860" y="80" width="160" height="55" fill="#3B82F6"/>
    <text class="label" x="940" y="103">Admin</text>
    <text class="sub-label" x="940" y="122">Vue.js</text>
  </g>

  <!-- 网关层 -->
  <rect x="40" y="190" width="1120" height="100" fill="rgba(16,185,129,0.08)" rx="12" stroke="rgba(16,185,129,0.2)"/>
  <text class="layer-title" x="60" y="212" fill="#10B981">网关层</text>
  <g>
    <rect class="box" x="350" y="210" width="200" height="55" fill="#10B981"/>
    <text class="label" x="450" y="233">API Gateway</text>
    <text class="sub-label" x="450" y="252">Nginx / Kong</text>
  </g>
  <g>
    <rect class="box" x="650" y="210" width="200" height="55" fill="#10B981"/>
    <text class="label" x="750" y="233">Auth Service</text>
    <text class="sub-label" x="750" y="252">JWT / OAuth2</text>
  </g>

  <!-- 服务层 -->
  <rect x="40" y="320" width="1120" height="160" fill="rgba(245,158,11,0.08)" rx="12" stroke="rgba(245,158,11,0.2)"/>
  <text class="layer-title" x="60" y="342" fill="#F59E0B">服务层</text>
  <g><rect class="box" x="80" y="360" width="160" height="55" fill="#F59E0B"/><text class="label" x="160" y="383">User Svc</text><text class="sub-label" x="160" y="402">FastAPI</text></g>
  <g><rect class="box" x="280" y="360" width="160" height="55" fill="#F59E0B"/><text class="label" x="360" y="383">Order Svc</text><text class="sub-label" x="360" y="402">FastAPI</text></g>
  <g><rect class="box" x="480" y="360" width="160" height="55" fill="#F59E0B"/><text class="label" x="560" y="383">Payment Svc</text><text class="sub-label" x="560" y="402">FastAPI</text></g>
  <g><rect class="box" x="680" y="360" width="160" height="55" fill="#F59E0B"/><text class="label" x="760" y="383">Notify Svc</text><text class="sub-label" x="760" y="402">FastAPI</text></g>
  <g><rect class="box" x="880" y="360" width="160" height="55" fill="#F59E0B"/><text class="label" x="960" y="383">Search Svc</text><text class="sub-label" x="960" y="402">Elasticsearch</text></g>

  <!-- 数据层 -->
  <rect x="40" y="510" width="1120" height="120" fill="rgba(139,92,246,0.08)" rx="12" stroke="rgba(139,92,246,0.2)"/>
  <text class="layer-title" x="60" y="532" fill="#8B5CF6">数据层</text>
  <g><rect class="box" x="120" y="550" width="160" height="55" fill="#8B5CF6"/><text class="label" x="200" y="573">PostgreSQL</text><text class="sub-label" x="200" y="592">主数据库</text></g>
  <g><rect class="box" x="370" y="550" width="160" height="55" fill="#8B5CF6"/><text class="label" x="450" y="573">Redis</text><text class="sub-label" x="450" y="592">缓存 + Session</text></g>
  <g><rect class="box" x="620" y="550" width="160" height="55" fill="#8B5CF6"/><text class="label" x="700" y="573">RabbitMQ</text><text class="sub-label" x="700" y="592">消息队列</text></g>
  <g><rect class="box" x="870" y="550" width="160" height="55" fill="#8B5CF6"/><text class="label" x="950" y="573">MinIO</text><text class="sub-label" x="950" y="592">对象存储</text></g>

  <!-- Arrows (simplified) -->
  <line class="arrow" x1="260" y1="135" x2="450" y2="210"/>
  <line class="arrow" x1="600" y1="135" x2="450" y2="210"/>
  <line class="arrow" x1="450" y1="265" x2="160" y2="360"/>
  <line class="arrow" x1="450" y1="265" x2="360" y2="360"/>
  <line class="arrow" x1="450" y1="265" x2="560" y2="360"/>
  <line class="arrow" x1="750" y1="265" x2="560" y2="360"/>
  <line class="arrow" x1="160" y1="415" x2="200" y2="550"/>
  <line class="arrow" x1="360" y1="415" x2="200" y2="550"/>
  <line class="arrow" x1="560" y1="415" x2="450" y2="550"/>
  <line class="arrow" x1="760" y1="415" x2="700" y2="550"/>
  <line class="arrow" x1="960" y1="415" x2="950" y2="550"/>
</svg>
</body>
</html>
